<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 - Page Not Found</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {

            background: #07111F;

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            overflow: hidden;

            position: relative;

        }



        body::before {

            content: "";

            position: absolute;

            width: 700px;
            height: 700px;

            background: #2563EB;

            border-radius: 50%;

            filter: blur(120px);

            left: -250px;
            top: -250px;

            opacity: .35;

            animation: float1 10s ease-in-out infinite;

        }

        body::after {

            content: "";

            position: absolute;

            width: 600px;
            height: 600px;

            background: #FF6B35;

            border-radius: 50%;

            filter: blur(120px);

            right: -220px;
            bottom: -220px;

            opacity: .35;

            animation: float2 12s ease-in-out infinite;

        }

        @keyframes float1 {

            50% {

                transform: translateY(40px);

            }

        }

        @keyframes float2 {

            50% {

                transform: translateY(-40px);

            }

        }



        .container {

            position: relative;

            z-index: 10;

            width: 90%;

            max-width: 760px;

            padding: 60px;

            text-align: center;

            border-radius: 30px;

            background: rgba(255, 255, 255, .08);

            backdrop-filter: blur(20px);

            border: 1px solid rgba(255, 255, 255, .15);

            box-shadow: 0 30px 60px rgba(0, 0, 0, .25);

        }



        .badge {

            display: inline-block;

            padding: 10px 24px;

            background: rgba(255, 255, 255, .08);

            color: #DC143C;

            border-radius: 50px;

            font-size: 14px;

            margin-bottom: 25px;

        }



        .error {

            font-size: 150px;

            font-weight: 800;

            color: #fff;

            line-height: 1;

            text-shadow:
                0 0 20px rgba(255, 107, 53, .6),
                0 0 40px rgba(37, 99, 235, .4);

            animation: pulse 2s infinite;

        }

        @keyframes pulse {

            50% {

                transform: scale(1.05);

            }

        }

        h2 {

            font-size: 42px;

            color: #fff;

            margin: 20px 0;

        }

        p {

            font-size: 17px;

            line-height: 1.8;

            color: #CBD5E1;

            max-width: 600px;

            margin: auto;

        }



        .buttons {

            display: flex;

            justify-content: center;

            gap: 20px;

            margin-top: 45px;

            flex-wrap: wrap;

        }

        .btn {

            padding: 16px 34px;

            border-radius: 50px;

            text-decoration: none;

            font-weight: 600;

            transition: .35s;

            display: inline-flex;

            align-items: center;

            gap: 10px;

        }

        .home {

            background: #DC143C;

            color: #fff;

        }

        .home:hover {

            transform: translateY(-6px);

            box-shadow: 0 20px 35px rgba(255, 107, 53, .4);

        }

        .back {

            background: transparent;

            color: #fff;

            border: 2px solid rgba(255, 255, 255, .25);

            cursor: pointer;

        }

        .back:hover {

            background: #fff;

            color: #111;

        }



        .dot {

            position: absolute;

            width: 8px;

            height: 8px;

            background: #00E5FF;

            border-radius: 50%;

            opacity: .6;

            animation: floatDot 8s linear infinite;

        }

        .dot:nth-child(1) {
            left: 10%;
            top: 20%;
        }

        .dot:nth-child(2) {
            left: 80%;
            top: 25%;
            animation-delay: 1s;
        }

        .dot:nth-child(3) {
            left: 20%;
            bottom: 20%;
            animation-delay: 2s;
        }

        .dot:nth-child(4) {
            right: 10%;
            bottom: 18%;
            animation-delay: 3s;
        }

        .dot:nth-child(5) {
            left: 55%;
            top: 10%;
            animation-delay: 4s;
        }

        @keyframes floatDot {

            0% {
                transform: translateY(0);
                opacity: .2;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateY(-120px);
                opacity: 0;
            }

        }

        .footer {

            margin-top: 40px;

            color: #94A3B8;

            font-size: 14px;

        }



        @media(max-width:768px) {

            .container {

                padding: 40px 25px;

            }

            .error {

                font-size: 100px;

            }

            h2 {

                font-size: 30px;

            }

            p {

                font-size: 15px;

            }

            .buttons {

                flex-direction: column;

            }

            .btn {

                width: 100%;

                justify-content: center;

            }

        }
    </style>

</head>

<body>

    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>

    <div class="container">

        <span class="badge">
            <i class="fa-solid fa-newspaper"></i>
            Breaking News
        </span>

        <div class="error">
            404
        </div>

        <h2>Oops! Story Not Found</h2>

        <p>
            The page you're looking for may have been moved,
            deleted, or never existed.
            Let's get you back to the latest headlines.
        </p>

        <div class="buttons">

            <a href="index.html" class="btn home">

                <i class="fa-solid fa-house"></i>

                Back to Home

            </a>

            <button class="btn back" onclick="goBack()">

                <i class="fa-solid fa-arrow-left"></i>

                Go Back

            </button>

        </div>

        <div class="footer">

            © 2026 News Magazine • Stay informed. Stay connected.

        </div>

    </div>

    <script>

        function goBack() {

            if (document.referrer) {

                history.back();

            } else {

                window.location.href = "index.html";

            }

        }

    </script>

</body>

</html>
